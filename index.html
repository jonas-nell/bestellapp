<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Unleash your appetite!</title>
        <link rel="shortcut icon" href="./assets/icons/burger-icon.png" type="image/x-icon">
        <link rel="stylesheet" href="./css/standard.css" />
        <link rel="stylesheet" href="./css/style.css" />
        <link rel="stylesheet" href="./css/responsiveness.css">
        <script src="./data/categories.js"></script>
        <script src="./js/templates.js"></script>
        <script src="./js/script.js" defer></script>
    </head>
    <body onload="loadDishes()">
        <header>
            <div class="content">
                <img class="header-img" src="./assets/icons/logo.png" alt="" />
            </div>
        </header>
        <main id="main">
            <section id="landing-section">
                <div class="content">
                    <div>
                        <img
                            class="landing-img"
                            src="./assets/img/header-image.jpg"
                            alt="Juicy Menu"
                        />
                        <img
                            class="landing-icon"
                            src="./assets/icons/main-icon.png"
                            alt=""
                        />
                    </div>
                    <div class="bottom-landingpage">
                        <div class="title">
                            <img class="rating-icon" src="./assets/icons/rating-icon.png" alt="">
                            <h1><span class="red">Burger</span>House</h1>
                        </div>
                        <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
                    </div>
                </div>
            </section>
            <section>
                <div class="content">
                    <div class="basket-container">
                        <aside id="basket"></aside>
                    </div>
                </div>
                <div id="main-content"></div>
            </section>

        </main>
        <footer>
            <p>Imprint</p>
            <p>Cookie Preferences</p>
            <div class="copyright"><img src="./assets/icons/copyright.png" alt=""> <p>2025 BurgerHouse</p></div>
        </footer>
        <nav>
            <a href="#landing-section"><img src="./assets/icons/home-icon.png" alt=""></a>
            <a href="https://pointerpointer.com/" target="_blank"><img src="./assets/icons/person-icon.png" alt=""></a>
            <a href="#burger-container"><img src="./assets/icons/menu-icon.png" alt=""></a>
            <button onclick="toggleBasket()"><img id="cart-icon" src="" alt=""> <span id="cart-badge"></span></button>
        </nav>
        <dialog id="confirmation">
            <img class="close-icon" onclick="closeOrderConfirmation(); closeBasket()" src="./assets/icons/close.png" alt="">
            <img class="truck" src="./assets/icons/delivery-truck-icon.png
            " alt="">
            <h5>Order confirmed!</h5>
            <p>Your food is on the way!</p>
        </dialog>
    </body>
</html>
